name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: api (FastAPI + pgvector)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mymemory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies (locked)
        run: uv sync --frozen
      - name: Byte-compile (syntax check)
        run: uv run python -m compileall -q src/api scripts
      - name: Smoke test (schema + pgvector round-trip)
        env:
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/mymemory
        run: uv run python scripts/ci_smoke.py

  agent:
    name: agent (LangChain)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync dependencies (locked)
        run: uv sync --frozen
      - name: Byte-compile (syntax check)
        run: uv run python -m compileall -q src/agents

  mobile:
    name: mobile (Expo / TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      # apps/mobile is an npm workspace, so install from the repo root.
      - name: Install dependencies
        run: npm ci
      - name: TypeScript typecheck
        run: npm --workspace apps/mobile run typecheck

  terraform:
    name: terraform (fmt + validate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Format check
        run: terraform fmt -check -recursive
      - name: Init (no backend)
        run: terraform init -backend=false
      - name: Validate
        run: terraform validate
